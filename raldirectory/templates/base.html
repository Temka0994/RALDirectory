{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LoRA</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="body">
    <header class="header">
        <div class="logo-container">
            <a href="/" class="logo-text">LoRA</a>
            <span class="logo-subtitle">Losses of Russian Aviation</span>
        </div>
        <nav class="navbar">
            <ul>
                <li><a>Search</a></li>
                <li><a>Test</a></li>
                <li><a>Language</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        {% block content %}
        {% endblock content %}
    </main>

    <div class="pagination">
        {% block pagination %}
        {% endblock pagination %}
    </div>

    <footer class="footer">
        <div>
            <div class="footer-brand">LoRA</div>
            <div class="footer-name">Losses of Russian Aviation</div>
            <div class="footer-copy">Розроблено на Django · 2026</div>
        </div>
        <div class="footer-stats">
            <div class="footer-divider"></div>
            <div class="footer-stat">
                <div class="footer-stat-num">{{ day_of_war }}</div>
                <div class="footer-stat-label">Днів війни</div>
            </div>
            <div class="footer-divider"></div>
        </div>
    <div class="footer-slava">
        Слава Україні<strong>Героям слава</strong>
    </div>
</footer>
</body>
</html>
